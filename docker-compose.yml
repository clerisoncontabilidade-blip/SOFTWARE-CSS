version: '3.8'
services:
  web:
    image: nginx:latest
    ports:
      - "8000:80"
    volumes:
      - ./html:/usr/share/nginx/html
  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mydb
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: